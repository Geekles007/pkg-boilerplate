name: Deploy site + registry

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/configure-pages@v5
        id: pages
      - run: pnpm install --frozen-lockfile
      - run: pnpm registry:build
      - name: Build site
        run: pnpm --filter @pkg-boilerplate/www build
        env:
          # Project pages live under /<repo>; user/org pages should set this to ''.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/www/out
      - uses: actions/deploy-pages@v4
        id: deployment
